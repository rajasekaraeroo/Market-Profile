name: Build Windows EXE

# Builds a standalone Windows executable with PyInstaller and publishes it
# to GitHub Releases only — never as a workflow artifact under the Actions
# tab, so there's a single, intentional download location for the EXE.
#
# Runs on a version tag push (e.g. v1.0.0): builds the EXE and attaches it
# to the GitHub Release for that tag. workflow_dispatch is also available
# for re-running against an existing tag ref if a release build needs to
# be redone.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name MarketProfile `
            --hidden-import upstox_client.feeder.proto.MarketDataFeedV3_pb2 `
            main.py

      - name: Attach EXE to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MarketProfile.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

