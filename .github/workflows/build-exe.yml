name: Build Windows EXE

# Builds a standalone Windows executable with PyInstaller and publishes it
# to GitHub Releases only — never as a workflow artifact under the Actions
# tab, so there's a single, intentional download location for the EXE.
#
# Runs on a version tag push (e.g. v1.0.0): builds the EXE and attaches it
# to the GitHub Release for that tag. Can also be triggered manually
# (workflow_dispatch) with a version input, for environments where pushing
# a tag isn't possible — the release step creates that tag itself.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create (e.g. v1.1.0)"
        required: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name MarketProfile `
            --hidden-import upstox_client.feeder.proto.MarketDataFeedV3_pb2 `
            main.py

      - name: Attach EXE to release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: dist/MarketProfile.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

